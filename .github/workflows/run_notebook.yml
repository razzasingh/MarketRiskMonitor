name: Run Market Risk Monitor

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1-5'  # Every weekday at 8am UTC
  workflow_dispatch:         # Allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jupyter nbconvert pandas numpy matplotlib yfinance

      - name: Create outputs folder
        run: mkdir -p outputs

      - name: Install ipykernel and register kernel
        run: |
          pip install ipykernel
          python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Run notebook
        run: |
          jupyter nbconvert --to notebook --execute "Market Risk Monitor.ipynb" --inplace --ExecutePreprocessor.kernel_name=python3

      - name: Get today's date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Convert latest HTML output for Pages
        run: |
          # Copy today's report to a fixed filename so the URL never changes
          cp "outputs/MarketRiskStressReport_${{ steps.date.outputs.DATE }}.html" outputs/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./outputs
