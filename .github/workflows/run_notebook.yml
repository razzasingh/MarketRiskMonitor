name: Run Market Risk Monitor

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1' 
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install jupyter nbconvert pandas numpy matplotlib yfinance ipykernel

      - name: Create outputs folder
        run: mkdir -p outputs

      - name: Register kernel
        run: |
          python -m ipykernel install --user --name python3 --display-name "Python 3"

      - name: Run notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute "Market Risk Monitor V4.ipynb" \
            --inplace \
            --ExecutePreprocessor.kernel_name=python3

      - name: Debug generated files
        run: |
          echo "=== Root directory ==="
          ls -la

          echo "=== Outputs folder ==="
          ls -la outputs/ || echo "outputs folder missing"

          echo "=== HTML files ==="
          find . -name "*.html"

      - name: Copy latest report to index.html
        run: |
          REPORT=$(ls outputs/MarketRiskStressReport_*.html | head -n 1)

          echo "Found report:"
          echo "$REPORT"

          cp "$REPORT" outputs/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./outputs
